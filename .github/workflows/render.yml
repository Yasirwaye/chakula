# Render Infrastructure as Code
# Docs: https://render.com/docs/infrastructure-as-code

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # BACKEND API SERVER
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: chakula-api
    runtime: node
    region: oregon  # Closest to East Africa available
    plan: starter   # $7/month — upgrade as needed
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: false  # We trigger via GitHub Actions

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000  # Render uses 10000 by default

      - key: DATABASE_URL
        fromDatabase:
          name: chakula-postgres
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: chakula-redis
          type: redis
          property: connectionString

      # All other env vars set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Must be set manually

      - key: REFRESH_TOKEN_SECRET
        sync: false

      - key: AT_API_KEY
        sync: false

      - key: AT_USERNAME
        sync: false

      - key: MPESA_CONSUMER_KEY
        sync: false

      - key: MPESA_CONSUMER_SECRET
        sync: false

      - key: MPESA_SHORTCODE
        sync: false

      - key: MPESA_PASSKEY
        sync: false

      - key: MPESA_CALLBACK_URL
        sync: false

      - key: MPESA_ENVIRONMENT
        value: production

      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false

      - key: FLUTTERWAVE_SECRET_KEY
        sync: false

      - key: FLUTTERWAVE_ENCRYPTION_KEY
        sync: false

      - key: FLUTTERWAVE_WEBHOOK_SECRET
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: SENTRY_DSN
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: DEFAULT_COMMISSION_PERCENTAGE
        value: 18

      - key: SERVICE_FEE_FIXED
        value: 50

      - key: BASE_DELIVERY_FEE
        value: 80

      - key: DELIVERY_FEE_PER_KM
        value: 20

      - key: ORDER_TIMEOUT_MINUTES
        value: 2

      - key: MAX_DELIVERY_RADIUS_KM
        value: 15

      - key: CURRENCY
        value: KES

      - key: COUNTRY_CODE
        value: KE

      - key: RIDER_BASE_EARNING
        value: 80

      - key: RIDER_EARNING_PER_KM
        value: 25

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # REDIS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: redis
    name: chakula-redis
    region: oregon
    plan: starter  # $10/month
    maxmemoryPolicy: allkeys-lru

databases:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # POSTGRESQL
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - name: chakula-postgres
    region: oregon
    plan: starter  # $7/month
    databaseName: chakula_prod
    user: chakula
    postgresMajorVersion: 16